name: LinkedIn Daily Ideas

on:
  schedule:
    - cron: '0 2 * * *'   # 7:30 AM IST every day (ideas ready before your morning)
  workflow_dispatch:        # Allow manual trigger

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Generate LinkedIn post ideas
        working-directory: /Users/sahilprakash/linkedin-agent
        run: /Library/Frameworks/Python.framework/Versions/3.14/bin/python3 linkedin_agent.py

      - name: Commit daily ideas file
        working-directory: /Users/sahilprakash/linkedin-agent
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "linkedin-bot@sahil"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/sahilprakash/linkedin-agent.git
          git add linkedin_ideas/
          git diff --staged --quiet || git commit -m "chore: linkedin ideas $(date +%Y-%m-%d) [skip ci]"
          git push
