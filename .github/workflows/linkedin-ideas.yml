name: LinkedIn Daily Ideas

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST every day
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Generate LinkedIn post ideas
        run: python3 linkedin_agent.py

      - name: Commit daily ideas file
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "linkedin-bot@sahil"
          git add linkedin_ideas/
          git diff --staged --quiet || git commit -m "chore: linkedin ideas $(date +%Y-%m-%d) [skip ci]"
          git push
